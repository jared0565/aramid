# Built-in defaults -- the bottom layer of aramid.config.load_config's
# three-layer merge (defaults <- ~/.aramid/config.toml <- <root>/aramid.toml).
# `bake_started`, `test_command`, and `scope_subpath` are intentionally
# absent here (TOML has no null literal): load_config falls back to None
# for any key missing after the full merge.
schema_version = 1
semgrep_block_armed = false

# Prefix/fnmatch entries dropped before any runner sees a file (spec section 8b).
# aramid.config.load_config ALWAYS unions these back in after merging repo/user
# config, regardless of what a repo's aramid.toml sets -- never removable.
ignore_paths = [
    ".aramid/", "graph-out/", ".graphite*", ".cache/",
    "node_modules/", ".venv/", "__pycache__/", ".git/",
]

[timeouts]
# Wall-clock budget in seconds, per gate (design doc section 3).
pre_commit = 5
pre_push = 300

# --- Phase 2a (spec sections 3-4): zero-token triage, drain scheduling, pack ---
[triage]
min_score = 40
extra_security_paths = []

[drain]
interval_hours = 4
max_items_per_drain = 10
item_expiry_days = 30
wall_clock_budget_s = 600

[pack]
enabled = true
# Block-tier regression-pack rules (aramid-regression.block.*) enforce
# immediately when true (the default) -- their OWN arming flag, deliberately
# separate from the OWASP bake's `semgrep_block_armed` (see policy.py's
# _PACK_BLOCK_PREFIX). Set false to demote noisy pack rules to WARN.
pack_block_armed = true

# --- Phase 2b (spec sections 2-5): the LLM reviewer ---
[llm]
enabled = true
max_items_per_drain = 3
call_timeout_s = 240
packet_max_bytes = 120000
# Bake-then-arm (spec section 5): confirmed-CRITICAL LLM findings WARN until
# `aramid arm --llm` flips this. Independent of `semgrep_block_armed` and
# `pack_block_armed`.
llm_block_armed = false
provider_order = ["claude-cli", "codex-cli", "ollama-cloud"]
# openrouter is OPT-IN / in-app only -- NOT part of the dev-time default chain
# (model-source policy). To use it, add "openrouter" to provider_order and an
# openrouter arm to [[llm.ladder]] in a repo's aramid.toml. These keys are read
# only by the opt-in openrouter provider:
model_openrouter = "anthropic/claude-sonnet-4-5"
openrouter_monthly_cap_usd = 5.0
# Hard cap on refute calls across a whole drain (spec section 4). A single
# review response can surface many CRITICAL candidates, each of which would
# otherwise trigger its own refute call -- max_items_per_drain bounds REVIEWS,
# not refutes. This bounds the pathological many-criticals case: once the cap
# is hit, a further fresh CRITICAL is treated exactly like a transport-failed
# refute (demoted to high, confirmed=False, never block-eligible) -- fail-safe,
# never a wrong block. 6 comfortably covers a typical 1-2 criticals per item
# across the default 3 items before it ever clips.
max_refutes_per_drain = 6

# Reviewer model ladder (deterministic risk-tiered selection, design section 6).
# The arm whose min_score band contains an item's triage score reviews it;
# degrade-to-nearest-available on provider outage. Each tier is a different
# provider so the cross-provider refuter always differs in model family.
# effort verified live 2026-07-14: `claude --effort high` and codex
# `-c model_reasoning_effort=medium` both accepted (exit 0) -> set below.
# cheap/ollama effort stays "" -- no OLLAMA_API_KEY was available to verify, and
# `think` is structural; unset is the fail-safe (a wrong value can't kill a tier).
# The mid model was gpt-5.6 (INVALID: "not supported ... with a ChatGPT account")
# -- corrected to gpt-5.5 (the codex config default) during live verification.
[[llm.ladder]]
tier = "cheap"
provider = "ollama-cloud"
model = "deepseek-v4-flash"   # unverified (no OLLAMA_API_KEY); tune per your account
effort = ""
min_score = 40

[[llm.ladder]]
tier = "mid"
provider = "codex-cli"
model = "gpt-5.5"
effort = "medium"
min_score = 60

[[llm.ladder]]
tier = "frontier"
provider = "claude-cli"
model = "opus"
effort = "high"
min_score = 80
